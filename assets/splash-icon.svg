<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Splash screen icon, matching background color #FAF8F5 defined in app.json -->
  <rect width="1024" height="1024" fill="#FAF8F5" />
  <g transform="translate(262, 212)">
    <!-- Top paper (just one for splash for lighter feel) -->
    <rect x="0" y="0" width="460" height="600" rx="30" fill="#FFFFFF" stroke="#E8E5E0" stroke-width="4" />
    
    <!-- Title text 'NoteCraft' -->
    <text x="230" y="250" font-family="sans-serif" font-size="64" font-weight="700" fill="#2C3E50" text-anchor="middle">NoteCraft</text>
    
    <!-- Lines on paper -->
    <rect x="60" y="340" width="340" height="8" rx="4" fill="#E8E5E0" />
    <rect x="60" y="400" width="280" height="8" rx="4" fill="#E8E5E0" />
  </g>
  
  <!-- Pen -->
  <g transform="translate(680, 480) rotate(-35)">
    <!-- Pen Tip -->
    <path d="M-20,-50 L20,-50 L0,0 Z" fill="#2C3E50" />
    <!-- Pen Tip Detail -->
    <path d="M0,-50 L0,-10" stroke="#FAF8F5" stroke-width="4" />
    <!-- Pen Body -->
    <rect x="-24" y="-350" width="48" height="300" rx="10" fill="#2C3E50" />
    <!-- Pen Cap -->
    <rect x="-26" y="-350" width="52" height="80" rx="12" fill="#4A90E2" />
    <!-- Clip -->
    <rect x="-34" y="-330" width="8" height="100" rx="4" fill="#7F8C8D" />
  </g>
</svg>
